name: Update Championship Predictions

on:
  # Runs every Monday at 10:00 UTC (day after race Sunday)
  schedule:
    - cron: '0 10 * * 1'

  # Manual trigger
  workflow_dispatch:

jobs:
  update-predictions:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Set up Python
        uses: actions/setup-python@v5
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run driver prediction update
        run: |
          python src/update_predictions.py | tee /tmp/update_output.txt

      - name: Run constructor prediction update
        run: |
          python src/update_constructor_predictions.py

      - name: Commit and push changes
        run: |
          RACE_NAME=$(grep "Found!" /tmp/update_output.txt | head -1 | sed 's/.*(\(.*\)).*/\1/' || echo "latest race")
          ROUND=$(grep "Checking for Round" /tmp/update_output.txt | grep -o '[0-9]*' || echo "")
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/ results/ README.md
          git diff --staged --quiet || git commit -m "Update predictions after R${ROUND}: ${RACE_NAME}"
          git push

